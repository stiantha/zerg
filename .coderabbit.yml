# .coderabbit.yml
reviews:
  comment_style: inline
  request_changes_threshold: high
  path_filters:
    - "**/*.tsx"
    - "**/*.ts"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.md"
    - "**/*.css"
    - "**/*.html"
    - "**/*.json"
    - "**/*.svg"
    - "**/*.flf"
  path_excludes:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.gif"
  
ai:
  use_advanced_reasoning: true
  review_comment_style: actionable
  summarize: true

review_scope:
  full_repository: true
